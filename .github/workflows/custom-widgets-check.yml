name: Custom Widgets Check

on:
  push:
    paths:
      - '.github/workflows/custom-widgets-check.yml'
      - 'example/HelloCustomWidgets/**'
      - 'scripts/checks/check_touch_release_semantics.py'
      - 'scripts/code_compile_check.py'
      - 'scripts/code_runtime_check.py'
      - 'src/widget/**'
      - 'src/core/**'

  schedule:
    - cron: '0 2 * * 1'

  workflow_dispatch:
    inputs:
      category:
        description: 'Widget category to check (empty for all)'
        required: false
        type: string

jobs:
  core-touch-audit:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: rlalik/setup-cpp-compiler@v1.2

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Audit core widget touch release semantics
        run: python scripts/checks/check_touch_release_semantics.py --scope core

  check:
    needs: core-touch-audit
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        category: [input, display, layout, chart, navigation, feedback, media, decoration]
    steps:
      - uses: actions/checkout@v6

      - uses: rlalik/setup-cpp-compiler@v1.2

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Audit custom widget touch release semantics (${{ matrix.category }})
        run: python scripts/checks/check_touch_release_semantics.py --scope custom --category ${{ matrix.category }}

      - name: Check custom widgets (${{ matrix.category }})
        run: python scripts/code_compile_check.py --custom-widgets --category ${{ matrix.category }} --bits64

      - name: Runtime check custom widgets (${{ matrix.category }})
        run: python scripts/code_runtime_check.py --app HelloCustomWidgets --category ${{ matrix.category }} --bits64
