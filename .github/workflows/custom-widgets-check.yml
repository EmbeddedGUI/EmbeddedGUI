name: Custom Widgets Check

on:
  push:
    paths:
      - '.github/workflows/custom-widgets-check.yml'
      - 'example/HelloCustomWidgets/**'
      - 'scripts/check_touch_release_semantics.py'
      - 'scripts/code_compile_check.py'
      - 'src/widget/**'
      - 'src/core/**'

  schedule:
    - cron: '0 2 * * 1'

  workflow_dispatch:
    inputs:
      category:
        description: 'Widget category to check (empty for all)'
        required: false
        type: string

jobs:
  check:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        category: [input, display, layout, chart, navigation, feedback, media, decoration]
    steps:
      - uses: actions/checkout@v4

      - uses: rlalik/setup-cpp-compiler@v1.2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Audit touch release semantics (${{ matrix.category }})
        run: python scripts/check_touch_release_semantics.py --category ${{ matrix.category }}

      - name: Check custom widgets (${{ matrix.category }})
        run: python scripts/code_compile_check.py --custom-widgets --category ${{ matrix.category }} --bits64
