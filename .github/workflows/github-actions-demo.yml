name: Compile Check
run-name: ${{ github.actor }} is start compile check 🚀
on: [push]
jobs:
  env_and_compile_check:
    #runs-on: ubuntu-latest
    runs-on: windows-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - run: echo "💡 The ${{ github.repository }} repository has been cloned to the runner."
      - name: Setup C/C++ env
        uses: rlalik/setup-cpp-compiler@v1.2
      - run: echo "🖥️ The workflow is now ready to test your code on the runner."
      - name: Start python env and install requirements
        run: python -m pip install -r scripts/ui_designer/requirements-desktop.txt
      - name: Run UI Designer Python tests
        run: python -m pytest -c scripts/ui_designer/pyproject.toml scripts/ui_designer/tests -v --tb=short
      - name: Run UI Designer live preview smoke
        run: python scripts\ui_designer_preview_smoke.py
      - name: Start Compile Test, full compile check.
        run: python scripts\code_compile_check.py --full-check --actions --bits64
      - name: Start Runtime Test, full runtime check.
        run: python scripts\code_runtime_check.py --full-check --bits64
      - name: Start Dirty Animation Check
        run: python scripts\code_dirty_animation_check.py --bits64
      - name: Start Virtual Stage Showcase Parity Check
        run: python scripts\showcase_stage_parity_check.py --timeout 35 --bits64
      - name: Start HelloVirtual Render Workflow
        run: python scripts\hello_basic_render_workflow.py --app HelloVirtual --suite basic --skip-unit-tests --bits64
      - run: echo "🍏 This job's status is ${{ job.status }}."
