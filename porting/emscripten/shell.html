<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EmbeddedGUI Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000; color: #eee;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #canvas {
            background: #000; cursor: pointer;
            max-width: 100%;
            max-height: calc(100vh - 24px);
        }
        #status {
            height: 20px; line-height: 20px;
            font-size: 0.8em; color: #888;
            text-align: center;
        }
        .spinner {
            display: inline-block; width: 16px; height: 16px;
            border: 2px solid #e94560; border-top-color: transparent;
            border-radius: 50%; animation: spin 0.8s linear infinite;
            vertical-align: middle; margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    <div id="status"><span class="spinner"></span>Loading...</div>

    <script>
        var Module = {
            canvas: (function() {
                var c = document.getElementById('canvas');
                c.addEventListener('webglcontextlost', function(e) {
                    e.preventDefault();
                    Module.setStatus('WebGL context lost. Reloading...');
                    setTimeout(function() { location.reload(); }, 1000);
                }, false);
                return c;
            })(),
            setStatus: function(text) {
                var el = document.getElementById('status');
                if (text) {
                    el.innerHTML = '<span class="spinner"></span>' + text;
                } else {
                    el.innerHTML = 'Running';
                }
            },
            totalDependencies: 0,
            monitorRunDependencies: function(left) {
                this.totalDependencies = Math.max(this.totalDependencies, left);
                Module.setStatus(left
                    ? 'Preparing... (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')'
                    : '');
            }
        };
        Module.setStatus('Downloading...');
        window.onerror = function() {
            Module.setStatus('Error! See browser console.');
        };
    </script>
    {{{ SCRIPT }}}
</body>
</html>
