<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EmbeddedGUI HelloCustomWidgets</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-sidebar">
    <div class="lang-toggle" role="group" aria-label="Language switch">
        <button type="button" class="lang-toggle-button" data-lang-switch="zh-CN">中文</button>
        <button type="button" class="lang-toggle-button" data-lang-switch="en">EN</button>
    </div>

    <aside class="sidebar-shell">
        <div class="sidebar-header">
            <div class="eyebrow">HelloCustomWidgets</div>
            <h1>自定义控件目录</h1>
            <p>按分类浏览可复用控件，直接查看 WebAssembly 实时预览和 README。</p>
            <div class="hero-links">
                <a class="button-link ghost" href="index.html">返回首页</a>
                <a class="button-link ghost" href="basic.html">基础控件浏览</a>
                <a class="button-link ghost" href="examples.html">其他例程</a>
            </div>
        </div>
        <div class="sidebar-tools">
            <input id="filter-input" class="filter-input" type="search" placeholder="筛选自定义控件">
        </div>
        <div id="category-list" class="sidebar-list"></div>
    </aside>

    <main class="content-shell">
        <div class="content-header">
            <div>
                <div class="eyebrow" id="content-eyebrow">目录 + README</div>
                <h2 id="content-title">选择一个自定义控件</h2>
                <p id="content-description">这个页面只展示已经生成进网页包的 HelloCustomWidgets 示例。</p>
                <div class="meta-row" id="content-meta">
                    <span class="metric-chip" id="catalog-chip">按分类浏览</span>
                </div>
            </div>
            <div class="demo-actions" id="header-actions"></div>
        </div>

        <div class="content-body">
            <div id="placeholder" class="empty-fill">
                <div class="placeholder-stack">
                    <h3 id="placeholder-title">等待选择控件</h3>
                    <p id="placeholder-description">左侧列表只使用 `demos.json` 中实际生成出来的 HelloCustomWidgets 条目，不再依赖额外元数据。</p>
                </div>
            </div>

            <div id="demo-wrapper" class="demo-panel hidden">
                <section class="demo-stage">
                    <div class="demo-stage-header">
                        <span id="stage-label">实时预览</span>
                        <span id="stage-size"></span>
                    </div>
                    <div class="demo-stage-body">
                        <iframe id="demo-frame" class="demo-frame" title="HelloCustomWidgets 示例"></iframe>
                    </div>
                </section>
                <section class="demo-doc-shell">
                    <div class="demo-stage-header">
                        <span id="doc-title">README</span>
                        <span id="doc-status">随网页示例一起生成</span>
                    </div>
                    <div id="demo-doc" class="doc-panel"></div>
                </section>
            </div>
        </div>
    </main>

    <script src="lib/marked.min.js"></script>
    <script src="i18n.js"></script>
    <script src="doc-render.js"></script>
    <script>
        var i18n = window.EmbeddedGUII18n;
        var categoryList = document.getElementById("category-list");
        var filterInput = document.getElementById("filter-input");
        var placeholder = document.getElementById("placeholder");
        var wrapper = document.getElementById("demo-wrapper");
        var contentTitle = document.getElementById("content-title");
        var contentDescription = document.getElementById("content-description");
        var contentMeta = document.getElementById("content-meta");
        var headerActions = document.getElementById("header-actions");
        var stageLabel = document.getElementById("stage-label");
        var stageSize = document.getElementById("stage-size");
        var docStatus = document.getElementById("doc-status");
        var demoMap = {};
        var grouped = {};
        var catalogData = null;
        var catalogMissing = false;

        var translations = {
            pageTitle: { "zh-CN": "EmbeddedGUI HelloCustomWidgets", "en": "EmbeddedGUI HelloCustomWidgets" },
            sidebarTitle: { "zh-CN": "自定义控件目录", "en": "Custom widget catalog" },
            sidebarDescription: { "zh-CN": "按分类浏览可复用控件，直接查看 WebAssembly 实时预览和 README。", "en": "Browse reusable widgets by category and open the live WebAssembly demo with the README." },
            backHome: { "zh-CN": "返回首页", "en": "Back to home" },
            coreWidgetBrowser: { "zh-CN": "基础控件浏览", "en": "Core widget browser" },
            otherExamples: { "zh-CN": "其他例程", "en": "Other examples" },
            filterPlaceholder: { "zh-CN": "筛选自定义控件", "en": "Filter custom widgets" },
            contentEyebrow: { "zh-CN": "目录 + README", "en": "Catalog + README" },
            defaultTitle: { "zh-CN": "选择一个自定义控件", "en": "Select a custom widget" },
            defaultDescription: { "zh-CN": "这个页面只展示已经生成进网页包的 HelloCustomWidgets 示例。", "en": "This page only lists HelloCustomWidgets demos that were actually generated into the web bundle." },
            categoryChip: { "zh-CN": "按分类浏览", "en": "Grouped by category" },
            placeholderTitle: { "zh-CN": "等待选择控件", "en": "Choose a widget" },
            placeholderDescription: { "zh-CN": "左侧列表只使用 `demos.json` 中实际生成出来的 HelloCustomWidgets 条目，不再依赖额外元数据。", "en": "The sidebar only uses generated HelloCustomWidgets entries from `demos.json` and no longer depends on extra metadata." },
            livePreview: { "zh-CN": "实时预览", "en": "Live preview" },
            readmeTitle: { "zh-CN": "README", "en": "README" },
            docBundled: { "zh-CN": "随网页示例一起生成", "en": "Bundled with the generated web demo" },
            docMissing: { "zh-CN": "当前条目没有 README", "en": "README missing for this entry" },
            openDemo: { "zh-CN": "打开示例", "en": "Open demo" },
            openReadme: { "zh-CN": "打开 README", "en": "Open README" },
            noEntriesTitle: { "zh-CN": "还没有生成自定义控件条目", "en": "No custom widget entries generated yet" },
            noEntriesDescription: { "zh-CN": "请先运行 `python scripts/wasm_build_demos.py`。", "en": "Run `python scripts/wasm_build_demos.py` first." },
            missingCatalogTitle: { "zh-CN": "缺少已生成的示例清单", "en": "Missing generated demo catalog" },
            missingCatalogDescription: { "zh-CN": "这个页面依赖 `web/demos/demos.json`。请先生成网页示例。", "en": "This page needs `web/demos/demos.json`. Generate the web demos first." },
            requestedMissingTitle: { "zh-CN": "请求的控件不在当前目录中", "en": "Requested widget is not in this catalog" },
            requestedMissingDescription: { "zh-CN": "当前生成目录里不包含 {demo}。", "en": "The generated catalog does not include {demo}." },
            demoFrameTitle: { "zh-CN": "HelloCustomWidgets 示例", "en": "HelloCustomWidgets demo" },
            summaryTemplate: { "zh-CN": "当前展示的是 {category} 分类下的 `{widget}`。", "en": "Showing `{widget}` from the {category} category." },
            hiddenMetadataNote: { "zh-CN": "不依赖额外元数据", "en": "No extra metadata" }
        };

        var categoryLabels = {
            input: { "zh-CN": "输入", "en": "Input" },
            layout: { "zh-CN": "布局", "en": "Layout" },
            display: { "zh-CN": "显示", "en": "Display" },
            feedback: { "zh-CN": "反馈", "en": "Feedback" },
            chart: { "zh-CN": "图表", "en": "Chart" },
            media: { "zh-CN": "媒体", "en": "Media" },
            navigation: { "zh-CN": "导航", "en": "Navigation" },
            decoration: { "zh-CN": "装饰", "en": "Decoration" },
            misc: { "zh-CN": "其他", "en": "Misc" }
        };

        function t(key, params) {
            return i18n.format(translations[key], params);
        }

        function formatWords(value) {
            return (value || "").replace(/_/g, " ").replace(/\b\w/g, function(ch) {
                return ch.toUpperCase();
            });
        }

        function formatCategory(value) {
            var key = String(value || "misc").toLowerCase();
            return i18n.format(categoryLabels[key] || {
                "zh-CN": formatWords(value),
                "en": formatWords(value)
            });
        }

        function resolveFrameHeight(demo) {
            var configured = Number(demo && demo.height);
            if (Number.isFinite(configured) && configured > 0) {
                return configured;
            }
            return 320;
        }

        function parseDemoMeta(demo) {
            if (demo.appSub && demo.appSub.indexOf("/") !== -1) {
                var appSubParts = demo.appSub.split("/", 2);
                return {
                    category: appSubParts[0],
                    widget: appSubParts[1]
                };
            }

            var raw = (demo.name || "").replace(/^HelloCustomWidgets_/, "");
            var splitAt = raw.indexOf("_");
            if (splitAt === -1) {
                return { category: "misc", widget: raw };
            }
            return {
                category: raw.slice(0, splitAt),
                widget: raw.slice(splitAt + 1)
            };
        }

        function getDemoPath(name, demo) {
            return "demos/" + name + "/" + (demo.app || demo.name) + ".html";
        }

        function getInitialTarget() {
            var params = new URLSearchParams(window.location.search);
            var candidate = params.get("demo") || params.get("app");
            if (candidate) {
                if (candidate.indexOf("HelloCustomWidgets_") === 0) {
                    return candidate;
                }
                return "HelloCustomWidgets_" + candidate.replace(/\//g, "_");
            }
            if (window.location.hash) {
                return window.location.hash.slice(1);
            }
            return "";
        }

        function updateLocation(name, meta) {
            var params = new URLSearchParams(window.location.search);
            params.set("demo", meta.category + "/" + meta.widget);
            history.replaceState(null, "", "?" + params.toString() + "#" + name);
        }

        function showPlaceholder(title, description) {
            placeholder.classList.remove("hidden");
            wrapper.classList.add("hidden");
            headerActions.innerHTML = "";
            contentTitle.textContent = title;
            contentDescription.textContent = description;
            contentMeta.innerHTML =
                '<span class="metric-chip">' + t("categoryChip") + "</span>" +
                '<span class="metric-chip">' + t("hiddenMetadataNote") + "</span>";
            document.getElementById("placeholder-title").textContent = title;
            document.getElementById("placeholder-description").textContent = description;
        }

        function updateActions(name, demo) {
            var actions = [
                '<a class="button-link secondary" href="' + getDemoPath(name, demo) + '" target="_blank" rel="noreferrer">' + t("openDemo") + "</a>"
            ];
            if (demo.doc) {
                actions.push('<a class="button-link ghost" href="' + demo.doc + '" target="_blank" rel="noreferrer">' + t("openReadme") + "</a>");
            }
            headerActions.innerHTML = actions.join("");
        }

        function loadDemo(name) {
            var demo = demoMap[name];
            if (!demo) {
                showPlaceholder(
                    t("requestedMissingTitle"),
                    t("requestedMissingDescription", { demo: name })
                );
                return;
            }

            var meta = parseDemoMeta(demo);
            var title = formatWords(meta.widget);
            var categoryLabel = formatCategory(meta.category);
            var frame = document.getElementById("demo-frame");

            placeholder.classList.add("hidden");
            wrapper.classList.remove("hidden");
            contentTitle.textContent = title;
            contentDescription.textContent = t("summaryTemplate", {
                category: categoryLabel,
                widget: meta.widget
            });
            contentMeta.innerHTML =
                '<span class="metric-chip">' + categoryLabel + "</span>" +
                '<span class="metric-chip">' + name + "</span>";
            stageLabel.textContent = t("livePreview");
            stageSize.textContent = (demo.width || "?") + " x " + (demo.height || "?");
            docStatus.textContent = demo.doc ? t("docBundled") : t("docMissing");
            frame.style.height = resolveFrameHeight(demo) + "px";
            frame.src = getDemoPath(name, demo);
            frame.title = t("demoFrameTitle");
            renderDoc(document.getElementById("demo-doc"), demo.doc || "");
            updateActions(name, demo);
            updateLocation(name, meta);

            document.querySelectorAll(".demo-item").forEach(function(item) {
                item.classList.toggle("active", item.dataset.name === name);
            });
        }

        function renderSidebar(demos) {
            catalogData = demos;
            catalogMissing = false;
            categoryList.innerHTML = "";
            demoMap = {};
            grouped = {};

            demos
                .filter(function(demo) { return demo.category === "HelloCustomWidgets"; })
                .sort(function(a, b) { return a.name.localeCompare(b.name); })
                .forEach(function(demo) {
                    var meta = parseDemoMeta(demo);
                    demo.meta = meta;
                    demoMap[demo.name] = demo;
                    if (!grouped[meta.category]) {
                        grouped[meta.category] = [];
                    }
                    grouped[meta.category].push(demo);
                });

            Object.keys(grouped).sort().forEach(function(category) {
                var section = document.createElement("section");
                section.className = "sidebar-section";

                var heading = document.createElement("div");
                heading.className = "sidebar-section-title";
                heading.innerHTML =
                    "<span>" + formatCategory(category) + "</span>" +
                    "<span>" + grouped[category].length + "</span>";
                section.appendChild(heading);

                grouped[category]
                    .sort(function(a, b) {
                        return formatWords(a.meta.widget).localeCompare(formatWords(b.meta.widget));
                    })
                    .forEach(function(demo) {
                        var item = document.createElement("a");
                        item.className = "demo-item";
                        item.href = "#" + demo.name;
                        item.dataset.name = demo.name;
                        item.dataset.search = (category + " " + demo.meta.widget + " " + demo.name).toLowerCase();
                        item.innerHTML =
                            "<strong>" + formatWords(demo.meta.widget) + "</strong>" +
                            '<div class="demo-item-meta">' + formatCategory(category) + "</div>";
                        item.addEventListener("click", function(event) {
                            event.preventDefault();
                            loadDemo(demo.name);
                        });
                        section.appendChild(item);
                    });

                categoryList.appendChild(section);
            });

            if (!Object.keys(grouped).length) {
                showPlaceholder(t("noEntriesTitle"), t("noEntriesDescription"));
                return;
            }

            var initialTarget = getInitialTarget();
            if (initialTarget) {
                loadDemo(initialTarget);
                return;
            }

            loadDemo(Object.keys(demoMap).sort()[0]);
        }

        function applyStaticLanguage() {
            document.title = t("pageTitle");
            document.querySelector(".sidebar-header h1").textContent = t("sidebarTitle");
            document.querySelector(".sidebar-header p").textContent = t("sidebarDescription");

            var sidebarLinks = document.querySelectorAll(".sidebar-header .hero-links a");
            sidebarLinks[0].textContent = t("backHome");
            sidebarLinks[1].textContent = t("coreWidgetBrowser");
            sidebarLinks[2].textContent = t("otherExamples");

            filterInput.placeholder = t("filterPlaceholder");
            document.getElementById("content-eyebrow").textContent = t("contentEyebrow");
            document.getElementById("doc-title").textContent = t("readmeTitle");
            document.getElementById("catalog-chip").textContent = t("categoryChip");
            document.getElementById("demo-frame").title = t("demoFrameTitle");

            if (!catalogData) {
                showPlaceholder(t("placeholderTitle"), t("placeholderDescription"));
            }
        }

        function showMissingCatalog() {
            catalogMissing = true;
            showPlaceholder(t("missingCatalogTitle"), t("missingCatalogDescription"));
        }

        function applyLanguage() {
            applyStaticLanguage();
            if (catalogData) {
                renderSidebar(catalogData);
                return;
            }
            if (catalogMissing) {
                showMissingCatalog();
            }
        }

        filterInput.addEventListener("input", function() {
            var query = filterInput.value.trim().toLowerCase();
            document.querySelectorAll(".sidebar-section").forEach(function(section) {
                var matches = 0;
                section.querySelectorAll(".demo-item").forEach(function(item) {
                    var visible = !query || item.dataset.search.indexOf(query) !== -1;
                    item.classList.toggle("hidden", !visible);
                    if (visible) {
                        matches += 1;
                    }
                });
                section.classList.toggle("hidden", matches === 0);
            });
        });

        fetch("demos/demos.json")
            .then(function(response) {
                if (!response.ok) {
                    throw new Error("Missing demos.json");
                }
                return response.json();
            })
            .then(renderSidebar)
            .catch(showMissingCatalog);

        document.addEventListener("embeddedgui:languagechange", applyLanguage);
        i18n.bindLanguageToggle(document);
        applyLanguage();
    </script>
</body>
</html>
