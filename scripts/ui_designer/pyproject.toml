[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
markers = [
    "integration: tests that need filesystem I/O",
    "unit: pure unit tests without I/O",
    "slow: tests that take more than a few seconds",
]
